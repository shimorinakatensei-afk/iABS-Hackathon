<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - iABS</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">iABS — Учёт Аренды</div>

            <div id="error-message" class="error-message" style="display: none;"></div>

            <form id="login-form">
                <div class="form-group">
                    <label class="form-label">Табельный номер</label>
                    <input type="text" class="form-input" id="personnel_number" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Пароль</label>
                    <input type="password" class="form-input" id="password" required>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    Войти
                </button>
            </form>

            <div class="login-hint">
                <strong>Тестовые учётные записи:</strong><br>
                SUPERADMIN: 00001 / admin123<br>
                ADMIN: 00002 / admin123<br>
                CONTROLLER: 00003 / admin123<br>
                OPERATOR: 00004 / admin123
            </div>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const personnelNumber = document.getElementById('personnel_number').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        personnel_number: personnelNumber,
                        password: password
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    errorDiv.textContent = error.detail;
                    errorDiv.style.display = 'block';
                    return;
                }

                const data = await response.json();
                document.cookie = `session_token=${data.token}; path=/`;
                window.location.href = '/lease-out';
            } catch (error) {
                errorDiv.textContent = 'Ошибка подключения к серверу';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
